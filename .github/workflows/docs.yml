name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.25'
      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2/p
          key: ubuntu-latest-conan-docs-${{ hashFiles('conanfile.py', 'conanfile.txt') }}
          restore-keys: ubuntu-latest-conan-
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y doxygen
          python3 scripts/init.py --docs
      - name: Build
        run: |
          conan install . --output-folder=build --build=missing -s compiler.cppstd=20 -c tools.cmake.cmaketoolchain:generator=Ninja
          echo '{"version":4,"vendor":{"conan":{}},"include":["build/CMakePresets.json"]}' > CMakeUserPresets.json
          cmake --preset conan-release
          cmake --build --preset conan-release -j$(nproc)
      - name: Build Doxygen XML
        run: cmake --build --preset conan-release --target docs
      - name: Build Sphinx HTML
        run: sphinx-build -b html docs build/docs/html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html
  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
