name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install CMake
      uses: jwlawrence/cmake-installer@v1.4
      with:
        cmake-version: '3.20'

    - name: Install Dependencies
      run: make init

    - name: Build
      run: make build

    - name: Test
      run: make test
