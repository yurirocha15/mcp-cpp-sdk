name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25'

    - name: Setup MSVC
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Dependencies
      run: python scripts/init.py

    - name: Cache Conan packages
      uses: actions/cache@v5
      with:
        path: ${{ env.HOME || env.USERPROFILE }}/.conan2/p
        key: ${{ matrix.os }}-conan-${{ hashFiles('conanfile.py', 'conanfile.txt') }}
        restore-keys: ${{ matrix.os }}-conan-

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: ${{ matrix.os }}-ccache-${{ github.ref }}
        restore-keys: ${{ matrix.os }}-ccache-
        max-size: 500M

    - name: Build and Test
      run: python scripts/build.py --test

  sanitize:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install CMake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.25'

    - name: Install Dependencies
      run: python scripts/init.py

    - name: Cache Conan packages
      uses: actions/cache@v5
      with:
        path: ${{ env.HOME || env.USERPROFILE }}/.conan2/p
        key: ubuntu-24.04-conan-sanitize-${{ hashFiles('conanfile.py', 'conanfile.txt') }}
        restore-keys: ubuntu-24.04-conan-

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: ubuntu-24.04-sanitize-ccache-${{ github.ref }}
        restore-keys: ubuntu-24.04-sanitize-ccache-
        max-size: 500M

    - name: Build and Test with Sanitizers
      run: python scripts/build.py --sanitize --test
